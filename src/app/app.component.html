<header class="app-header">
  <div class="header-container">
    <a routerLink="/" class="logo-area">
      <mat-icon class="logo-icon">bolt</mat-icon>
      <span class="logo-text">Cloudground</span>
    </a>
    
    <nav class="nav-links">
      <a routerLink="/tasks" routerLinkActive="active" class="nav-link">
        <mat-icon>assignment</mat-icon>
        <span>Tasks</span>
      </a>
      <a routerLink="/people" routerLinkActive="active" class="nav-link">
        <mat-icon>groups</mat-icon>
        <span>Team</span>
      </a>
      <a routerLink="/wiki" routerLinkActive="active" class="nav-link">
        <mat-icon>library_books</mat-icon>
        <span>Wiki</span>
      </a>
      <a routerLink="/gantt" routerLinkActive="active" class="nav-link">
        <mat-icon>bar_chart</mat-icon>
        <span>Gantt</span>
      </a>
      <a routerLink="/raci" routerLinkActive="active" class="nav-link">
        <mat-icon>view_list</mat-icon>
        <span>RACI</span>
      </a>
    </nav>

    <div class="header-badge" style="display: flex; gap: 1rem; align-items: center;">
      <span class="edge-pill">Edge Native</span>
      
      @if (authService.currentUser$ | async; as user) {
        <button mat-button [matMenuTriggerFor]="userMenu" style="color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 20px;">
          <mat-icon>account_circle</mat-icon> {{ user.email }}
        </button>
        <mat-menu #userMenu="matMenu">
          <button mat-menu-item (click)="logout()">
            <mat-icon>exit_to_app</mat-icon>
            <span>Logout</span>
          </button>
        </mat-menu>
      }
    </div>
  </div>
</header>

<main class="main">
  <div class="content">
    <!-- Router renders the components here based on the URL -->
    <router-outlet></router-outlet>
    
    <div class="debug-card">
      <div class="debug-header">
        <mat-icon>terminal</mat-icon>
        <h3>Edge Node Metadata</h3>
      </div>
      @if (apiData()) {
        <pre>{{ apiData() | json }}</pre>
      } @else {
        <div class="loading-state">
          <mat-icon class="spin-icon">sync</mat-icon>
          <span>Awaiting edge worker response...</span>
        </div>
      }
    </div>
  </div>
</main>
